apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-plat

resources:
- namespace.yaml
- configmap.yaml
- postgres-statefulset.yaml
- redis-deployment.yaml
- api-deployment.yaml
- gateway-deployment.yaml
- web-deployment.yaml
- ingress.yaml

commonLabels:
  app.kubernetes.io/name: ai-plat
  app.kubernetes.io/managed-by: kustomize

images:
- name: ai-plat/api
  newTag: latest
- name: ai-plat/gateway
  newTag: latest
- name: ai-plat/web
  newTag: latest
