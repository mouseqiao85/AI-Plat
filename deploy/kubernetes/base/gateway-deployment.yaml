apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: ai-plat
  labels:
    app: gateway-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
      - name: gateway
        image: ai-plat/gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: ai-plat-config
        - secretRef:
            name: ai-plat-secrets
        env:
        - name: UPSTREAM_API_URL
          value: "http://api-service:8000"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: ai-plat
spec:
  selector:
    app: gateway-service
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
