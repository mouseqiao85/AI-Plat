apiVersion: v1
kind: Secret
metadata:
  name: ai-plat-secrets
  namespace: ai-plat
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres:5432/ai_plat"
  REDIS_URL: "redis://redis:6379/0"
  JWT_SECRET: "your-jwt-secret-change-in-production"
  POSTGRES_PASSWORD: "postgres123"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-plat-config
  namespace: ai-plat
data:
  APP_NAME: "NexusMind OS - AI-Plat Platform"
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  CORS_ORIGINS: "http://localhost:3000,http://localhost:8080"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_MAX_REQUESTS: "100"
