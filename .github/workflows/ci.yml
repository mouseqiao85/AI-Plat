name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  go:
    name: Go Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Go vet
        run: go vet ./...
      - name: Go build
        run: go build -o /tmp/gateway ./cmd/gateway
      - name: Go test
        run: go test -v -race ./...

  python:
    name: Python Agent
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -v -e ".[dev]" || pip install -v -e . ; fi
          pip install pytest pytest-asyncio
      - name: Pytest
        env:
          LLM_API_KEY: test-key
          LLM_DEEPSEEK_API_KEY: test-key
          OPENAI_API_KEY: test-key
          LLM_BASE_URL: https://api.openai.com/v1
        run: |
          if [ -d tests ]; then pytest tests/ -v ; else echo "no tests dir"; fi

  lint-docs:
    name: Lint docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for leaked secrets
        run: |
          # Rough grep — fail if any known secret prefix appears in tracked files (except .env.example)
          ! grep -rE "sk-[a-zA-Z0-9]{20,}|Bearer [a-zA-Z0-9]{30,}" --include="*.go" --include="*.py" --include="*.md" --include="*.yaml" --include="*.yml" --include=".env*" --exclude=".env.example" .
