name: Build and Deploy

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ai-plat/api
  GATEWAY_IMAGE_NAME: ai-plat/gateway
  WEB_IMAGE_NAME: ai-plat/web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for API
      id: meta-api
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}

    - name: Build and push API
      uses: docker/build-push-action@v5
      with:
        context: ./platform
        file: ./deploy/docker/Dockerfile.api
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta-api.outputs.tags }}
        labels: ${{ steps.meta-api.outputs.labels }}

    - name: Extract metadata for Gateway
      id: meta-gateway
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.GATEWAY_IMAGE_NAME }}

    - name: Build and push Gateway
      uses: docker/build-push-action@v5
      with:
        context: ./platform
        file: ./deploy/docker/Dockerfile.gateway
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta-gateway.outputs.tags }}
        labels: ${{ steps.meta-gateway.outputs.labels }}

    - name: Extract metadata for Web
      id: meta-web
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}

    - name: Build and push Web
      uses: docker/build-push-action@v5
      with:
        context: ./platform
        file: ./deploy/docker/Dockerfile.web
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta-web.outputs.tags }}
        labels: ${{ steps.meta-web.outputs.labels }}

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd platform
        pip install -r requirements.txt
        pip install pytest pytest-cov

    - name: Run tests
      run: |
        cd platform
        pytest --cov=. --cov-report=xml

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./platform/coverage.xml

  deploy:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Update kubeconfig
      run: aws eks update-kubeconfig --name ai-plat-cluster

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -k deploy/kubernetes/overlays/prod

    - name: Wait for deployment
      run: |
        kubectl rollout status deployment/api-service -n ai-plat
        kubectl rollout status deployment/gateway-service -n ai-plat
        kubectl rollout status deployment/web-service -n ai-plat

    - name: Verify deployment
      run: |
        kubectl get pods -n ai-plat
        kubectl get services -n ai-plat
