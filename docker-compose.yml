version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      - AGENT_SERVICE_URL=http://agent-service:8001
    depends_on:
      - agent-service
      - redis
    networks:
      - agent-network
    volumes:
      - gateway_data:/app/data

  agent-service:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.agent
    ports:
      - "8001:8001"
    environment:
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - GO_CALLBACK_URL=http://gateway:8080
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - agent-network
    volumes:
      - agent_data:/app/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - agent-network
    volumes:
      - redis_data:/data

volumes:
  gateway_data:
  agent_data:
  redis_data:

networks:
  agent-network:
    driver: bridge
